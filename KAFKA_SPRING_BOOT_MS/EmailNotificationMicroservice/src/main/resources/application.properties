spring.application.name=EmailNotificationMicroservice


server.port=0
spring.kafka.consumer.bootstrap-servers=[::1]:9092,[::1]:9094,[::1]:9096
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
#spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JacksonJsonDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

#Consumer group Id for partition and rebalancing
consumer.group-id=product-created-events
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# 2. FIX: Tells the wrapper explicitly what class to delegate the actual work to
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JacksonJsonDeserializer


spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.username=bhaskar
spring.datasource.password=bhaskar
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true